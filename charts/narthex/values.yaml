# Default values for narthex.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: docker.io/muhfalihr/narthex
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  frontendPort: 80
  backendPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: narthex.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Dynamic Environment Variables (ConfigMap)
env:
  db.host: '{{ include "narthex.fullname" . }}-postgres'
  db.port: "5432"
  app.host: "0.0.0.0"
  app.port: "3000"

# Sensitive Environment Variables (Secret)
secrets:
  db.user: "narthex_user"
  db.password: "narthex_password"
  db.name: "narthex_db"

postgres:
  enabled: true
  image:
    repository: postgis/postgis
    tag: 15-3.4-alpine
  persistence:
    enabled: false
    # storageClass: "standard"
    size: 10Gi
  pgData: /var/lib/postgresql/data/pgdata
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  command: 
    - /bin/sh
    - -c
    - |
      docker-entrypoint.sh -c shared_buffers=4GB \
      -c max_connections=200 \
      -c shared_buffers=2GB \
      -c effective_cache_size=6GB \
      -c maintenance_work_mem=1GB \
      -c checkpoint_completion_target=0.9 \
      -c wal_buffers=16MB \
      -c default_statistics_target=500 \
      -c random_page_cost=1.1 \
      -c effective_io_concurrency=200 \
      -c work_mem=4621kB \
      -c huge_pages=off \
      -c min_wal_size=4GB \
      -c max_wal_size=16GB \
      -c log_timezone='Asia/Jakarta' \
      -c timezone='Asia/Jakarta' \
      -c ssl=off
