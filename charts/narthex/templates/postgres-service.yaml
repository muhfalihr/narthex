apiVersion: v1
kind: Service
metadata:
  name: {{ include "narthex.fullname" . }}-postgres
  labels:
    {{- include "narthex.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    {{- include "narthex.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
